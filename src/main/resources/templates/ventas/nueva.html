<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Nueva Venta - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Nueva Venta</h4>
        </div>
        <div class="card-body">
            <form>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="cliente" class="form-label">Cliente</label>
                            <select class="form-select" id="cliente">
                                <option selected>Seleccionar cliente</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="fecha" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha">
                        </div>
                    </div>
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Detalles de Venta</label>
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="text" class="form-control form-control-sm"></td>
                                <td><input type="number" class="form-control form-control-sm"></td>
                                <td><input type="number" class="form-control form-control-sm"></td>
                                <td><input type="number" class="form-control form-control-sm" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="row">
                    <div class="col-md-6 ms-auto">
                        <div class="form-group mb-3">
                            <label class="form-label">Total: <strong>$0.00</strong></label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Venta</button>
                <button type="reset" class="btn btn-secondary">Limpiar</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
