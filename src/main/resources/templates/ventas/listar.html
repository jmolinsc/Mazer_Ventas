<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Listar Ventas - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="card-title">Historial de Ventas</h4>
            <a th:href="@{/ventas/nueva}" class="btn btn-primary btn-sm">Nueva Venta</a>
        </div>
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <table class="table table-striped" id="table1">
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Cliente</th>
                        <th>Items</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="venta : ${ventas}">
                        <td th:text="${venta.id}">1</td>
                        <td th:text="${venta.cliente.nombre}">Cliente</td>
                        <td th:text="${venta.detalles != null ? venta.detalles.size() : 0}">1</td>
                        <td th:text="${venta.fecha}">2026-03-10</td>
                        <td th:text="${#numbers.formatDecimal(venta.total, 1, 'POINT', 2, 'COMMA')}">0.00</td>
                        <td><span class="badge bg-success" th:text="${venta.estado}">COMPLETADA</span></td>
                        <td>
                            <a class="btn btn-warning btn-sm" th:href="@{'/ventas/editar/' + ${venta.id}}">Editar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
