<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, pageHeading, pageSubtitle, bodyContent)">
<head th:replace="~{fragments/head :: appHead(${pageTitle})}"></head>
<body>
<script th:replace="~{fragments/scripts :: themeInitScript}"></script>
<div id="app">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="main">
        <div th:replace="~{fragments/header :: pageHeader}"></div>

        <div class="page-heading">
            <div class="page-title">
                <div class="row">
                    <div class="col-12 col-md-6 order-md-1 order-last">
                        <h3 th:text="${pageHeading}">Page title</h3>
                        <p class="text-subtitle text-muted" th:text="${pageSubtitle}">Page subtitle</p>
                    </div>
                    <div class="col-12 col-md-6 order-md-2 order-first">
                        <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a th:href="@{/index}">Dashboard</a></li>
                                <li class="breadcrumb-item active" aria-current="page" th:text="${pageHeading}">Page title</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>

            <div th:replace="${bodyContent}"></div>
        </div>

        <div th:replace="~{fragments/footer :: pageFooter}"></div>
    </div>
</div>

<script th:replace="~{fragments/scripts :: darkScript}"></script>
<script th:replace="~{fragments/scripts :: scrollbarScript}"></script>
<script th:replace="~{fragments/scripts :: appScript}"></script>
<script th:replace="~{fragments/scripts :: datatableScript}"></script>
<script th:replace="~{fragments/scripts :: datatableInitScript}"></script>
</body>
</html>
