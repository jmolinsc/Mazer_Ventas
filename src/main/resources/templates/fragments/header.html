<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<header class="mb-3" th:fragment="pageHeader">
    <div class="d-flex justify-content-between align-items-center">
        <a href="#" class="burger-btn d-block d-xl-none">
            <i class="bi bi-justify fs-3"></i>
        </a>

        <div class="ms-auto d-flex align-items-center gap-3" th:if="${currentUser != null}">
            <div class="text-end">
                <div class="fw-bold" th:text="${currentUser.nombreCompleto}">Administrador General</div>
                <small class="text-muted" th:text="${currentUser.username}">@admin</small>
            </div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</header>
</html>
