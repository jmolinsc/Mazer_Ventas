<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Existencias en Inventario',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Stock Disponible</h4>
        </div>
        <div class="card-body">
            <table class="table table-striped" id="table1">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Unidad</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="producto : ${productos}">
                        <td th:text="${producto.codigo}">001</td>
                        <td th:text="${producto.nombre}">Producto A</td>
                        <td th:text="${producto.stock}">0</td>
                        <td th:text="${producto.unidad}">Unidad</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${producto.stock == 0} ? ' bg-danger' : (${producto.stock < 10} ? ' bg-warning text-dark' : ' bg-info')"
                                  th:text="${producto.stock == 0} ? 'Agotado' : (${producto.stock < 10} ? 'Bajo Stock' : 'Disponible')">Disponible</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
