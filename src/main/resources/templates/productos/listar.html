<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Listar Productos - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="card-title">Catálogo de Productos</h4>
            <a th:href="@{/productos/nuevo}" class="btn btn-primary btn-sm">Nuevo Producto</a>
        </div>
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <table class="table table-striped" id="table1">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Unidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="producto : ${productos}">
                        <td th:text="${producto.codigo}">P001</td>
                        <td th:text="${producto.nombre}">Producto</td>
                        <td th:text="${producto.categoria}">Categoría</td>
                        <td th:text="${#numbers.formatDecimal(producto.precio, 1, 'POINT', 2, 'COMMA')}">0.00</td>
                        <td th:text="${producto.stock}">0</td>
                        <td th:text="${producto.unidad}">Unidad</td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-warning btn-sm" th:href="@{'/productos/editar/' + ${producto.id}}">Editar</a>
                            <form method="post" th:action="@{'/productos/eliminar/' + ${producto.id}}" onsubmit="return confirm('Eliminar producto?');">
                                <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
