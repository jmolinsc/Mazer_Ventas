<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Nuevo Producto - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Registrar Nuevo Producto</h4>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <form method="post" th:action="@{/productos/nuevo}" th:object="${productoForm}">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="nombre" class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}">
                            <small class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="codigo" class="form-label">Código</label>
                            <input type="text" class="form-control" id="codigo" th:field="*{codigo}">
                            <small class="text-danger" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></small>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="categoria" class="form-label">Categoría</label>
                            <select class="form-select" id="categoria" th:field="*{categoria}">
                                <option value="">Seleccionar categoría</option>
                                <option th:each="categoria : ${categorias}" th:value="${categoria}" th:text="${categoria}"></option>
                            </select>
                            <small class="text-danger" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="fabricanteId" class="form-label">Fabricante</label>
                            <select class="form-select" id="fabricanteId" th:field="*{fabricanteId}">
                                <option value="">Seleccionar fabricante</option>
                                <option th:each="fabricante : ${fabricantes}" th:value="${fabricante.id}" th:text="${fabricante.nombre}"></option>
                            </select>
                            <small class="text-danger" th:if="${#fields.hasErrors('fabricanteId')}" th:errors="*{fabricanteId}"></small>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="unidad" class="form-label">Unidad</label>
                            <select class="form-select" id="unidad" th:field="*{unidad}">
                                <option value="">Seleccionar unidad</option>
                                <option th:each="unidad : ${unidades}" th:value="${unidad}" th:text="${unidad}"></option>
                            </select>
                            <small class="text-danger" th:if="${#fields.hasErrors('unidad')}" th:errors="*{unidad}"></small>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="precio" class="form-label">Precio</label>
                            <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}">
                            <small class="text-danger" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="stock" th:field="*{stock}">
                            <small class="text-danger" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></small>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Producto</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
