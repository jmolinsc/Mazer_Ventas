<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Unidades de Medida',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="card-title">Administrar Unidades</h4>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/productos/categorias}">Volver a Categorias</a>
        </div>
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form class="row g-3 mb-4"
                  method="post"
                  th:action="${editMode} ? @{'/productos/categorias/unidades/editar/' + ${unidadId}} : @{/productos/categorias/unidades}"
                  th:object="${unidadForm}">
                <div class="col-md-4">
                    <label class="form-label" for="nombre">Unidad</label>
                    <input id="nombre" class="form-control" th:field="*{nombre}" type="text">
                    <small class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="descripcion">Descripcion</label>
                    <input id="descripcion" class="form-control" th:field="*{descripcion}" type="text">
                    <small class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></small>
                </div>
                <div class="col-md-2 d-grid align-items-end">
                    <button class="btn btn-primary" type="submit" th:text="${editMode} ? 'Actualizar' : 'Crear'">Crear</button>
                </div>
            </form>

            <table class="table table-striped" id="table1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Unidad</th>
                        <th>Descripcion</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="unidad : ${unidades}">
                        <td th:text="${unidad.id}">1</td>
                        <td th:text="${unidad.nombre}">Unidad</td>
                        <td th:text="${unidad.descripcion}">Unidad base</td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-warning btn-sm" th:href="@{'/productos/categorias/unidades/editar/' + ${unidad.id}}">Editar</a>
                            <form method="post" th:action="@{'/productos/categorias/unidades/eliminar/' + ${unidad.id}}" onsubmit="return confirm('Eliminar unidad?');">
                                <button class="btn btn-danger btn-sm" type="submit">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
