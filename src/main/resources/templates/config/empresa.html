<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Datos de la Empresa - Configuración',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="row">
        <div class="col-12 col-lg-7">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title mb-0">Información general</h4>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Razón social</label>
                            <input type="text" class="form-control" value="Mazer Ventas S.A.">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">NIT / RUC</label>
                                <input type="text" class="form-control" value="001-010101-0001">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-control" value="+503 2222-3333">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo corporativo</label>
                            <input type="email" class="form-control" value="admin@mazer.local">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <textarea class="form-control" rows="3">Calle principal #123, Ciudad</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-5">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title mb-0">Estado del módulo de seguridad</h4>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Spring Security
                            <span class="badge bg-success">Activo</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Autenticación
                            <span class="badge bg-success">Base de datos</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Autorización de rutas
                            <span class="badge bg-success">Dinámica (DB)</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Menú sidebar
                            <span class="badge bg-success">Dinámico por rol</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            CSRF
                            <span class="badge bg-warning text-dark">Desactivado (dev)</span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header">
                    <h4 class="card-title mb-0">Acceso rápido</h4>
                </div>
                <div class="card-body d-grid gap-2">
                    <a th:href="@{/config/usuarios}" class="btn btn-outline-primary">
                        <i class="bi bi-people me-2"></i>Gestionar usuarios
                    </a>
                    <a th:href="@{/config/permisos}" class="btn btn-outline-secondary">
                        <i class="bi bi-shield-check me-2"></i>Gestionar permisos
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
