<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Gestión de Usuarios - Configuración',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="row">
        <div class="col-12 col-xl-7">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="card-title mb-0">Usuarios del sistema</h4>
                    <span class="badge bg-light-primary" th:text="${#lists.size(users)} + ' registrados'">0 registrados</span>
                </div>
                <div class="card-body">
                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                    <div class="table-responsive">
                        <table class="table table-striped" id="table1">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Correo</th>
                                <th>Roles</th>
                                <th>Estado</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td>
                                    <div class="fw-bold" th:text="${user.username}">admin</div>
                                    <small class="text-muted" th:text="${user.nombreCompleto}">Administrador General</small>
                                </td>
                                <td th:text="${user.email}">admin@mazer.local</td>
                                <td>
                                    <span class="badge bg-light-primary me-1" th:each="role : ${user.roles}" th:text="${role.nombre}">Administrador</span>
                                </td>
                                <td>
                                    <span class="badge bg-success" th:if="${user.activo}">Activo</span>
                                    <span class="badge bg-secondary" th:unless="${user.activo}">Inactivo</span>
                                    <span class="badge bg-danger ms-1" th:if="${user.bloqueado}">Bloqueado</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-5">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title mb-0">Nuevo usuario</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/config/usuarios}" th:object="${userForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" class="form-control" th:field="*{username}" placeholder="usuario.login">
                            <small class="text-danger" th:errors="*{username}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" th:field="*{nombreCompleto}" placeholder="Nombre Apellido">
                            <small class="text-danger" th:errors="*{nombreCompleto}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="usuario@empresa.com">
                            <small class="text-danger" th:errors="*{email}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Mínimo 8 caracteres">
                            <small class="text-danger" th:errors="*{password}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div class="border rounded p-3">
                                <div class="form-check" th:each="role : ${roles}">
                                    <input class="form-check-input" type="checkbox" th:field="*{roleIds}" th:value="${role.id}" th:id="'role-' + ${role.id}">
                                    <label class="form-check-label" th:for="'role-' + ${role.id}">
                                        <span class="fw-bold" th:text="${role.nombre}">Administrador</span>
                                        <small class="d-block text-muted" th:text="${role.descripcion}">Acceso completo</small>
                                    </label>
                                </div>
                            </div>
                            <small class="text-danger" th:errors="*{roleIds}"></small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Crear usuario</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
