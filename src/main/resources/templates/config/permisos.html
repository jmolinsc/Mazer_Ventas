<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Gestión de Permisos - Configuración',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="card-title mb-0">Administrar permisos por rol</h4>
            <div class="d-flex gap-2 align-items-center">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/config/menus}">Gestionar menús</a>
                <span class="badge bg-light-primary" th:text="${#lists.size(roles)} + ' roles disponibles'">0 roles</span>
            </div>
        </div>
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form method="post" th:action="@{/config/permisos/roles}" th:object="${roleForm}" class="row g-3 mb-4">
                <div class="col-md-3">
                    <label for="codigo" class="form-label">Código de rol</label>
                    <input type="text" id="codigo" class="form-control" th:field="*{codigo}" placeholder="EJ: SUPERVISOR">
                    <small class="text-danger" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}">Error</small>
                </div>
                <div class="col-md-4">
                    <label for="nombre" class="form-label">Nombre del rol</label>
                    <input type="text" id="nombre" class="form-control" th:field="*{nombre}" placeholder="Supervisor de ventas">
                    <small class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</small>
                </div>
                <div class="col-md-4">
                    <label for="descripcion" class="form-label">Descripción</label>
                    <input type="text" id="descripcion" class="form-control" th:field="*{descripcion}" placeholder="Rol para supervisar al equipo">
                    <small class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error</small>
                </div>
                <div class="col-md-1 d-grid align-items-end">
                    <button type="submit" class="btn btn-outline-primary">Crear</button>
                </div>
            </form>

            <form method="get" th:action="@{/config/permisos}" class="row g-3 align-items-end mb-4">
                <div class="col-md-6">
                    <label for="roleId" class="form-label">Seleccionar rol</label>
                    <select class="form-select" id="roleId" name="roleId" onchange="this.form.submit()">
                        <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.nombre}" th:selected="${role.id == selectedRoleId}">Administrador</option>
                    </select>
                </div>
            </form>

            <form th:if="${selectedRoleId != null}" th:action="@{'/config/permisos/' + ${selectedRoleId}}" th:object="${permissionForm}" method="post">
                <div class="row" th:each="group : ${permissionCatalog}">
                    <div class="col-12">
                        <div class="card border shadow-none mb-3">
                            <div class="card-header">
                                <h5 class="mb-0" th:text="${group.menuName()}">Ventas</h5>
                                <small class="text-muted" th:text="${group.section()}">Sistema de Ventas</small>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6 col-xl-4" th:each="option : ${group.options()}">
                                        <div class="form-check border rounded p-3 h-100">
                                            <input class="form-check-input" type="checkbox" th:field="*{optionIds}" th:value="${option.id}" th:id="'option-' + ${option.id}">
                                            <label class="form-check-label ms-2" th:for="'option-' + ${option.id}">
                                                <span class="fw-bold d-block" th:text="${option.name()}">Nueva venta</span>
                                                <small class="text-muted d-block" th:text="${option.url()}">/ventas/nueva</small>
                                                <small class="text-muted" th:text="${option.description()}">Registrar venta</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Guardar permisos</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
