<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Listar Fabricantes - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="card-title">Base de Datos de Fabricantes</h4>
            <a th:href="@{/fabricantes/nuevo}" class="btn btn-primary btn-sm">Nuevo Fabricante</a>
        </div>
        <div class="card-body">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>
            <table class="table table-striped" id="table1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Telefono</th>
                        <th>Pais</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fab : ${fabricantes}">
                        <td th:text="${fab.id}">1</td>
                        <td th:text="${fab.nombre}">Fabricante</td>
                        <td th:text="${fab.email}">fab@email.com</td>
                        <td th:text="${fab.telefono}">555-0000</td>
                        <td th:text="${fab.pais}">Colombia</td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-warning btn-sm"
                               th:href="@{'/fabricantes/editar/' + ${fab.id}}">Editar</a>
                            <form method="post"
                                  th:action="@{'/fabricantes/eliminar/' + ${fab.id}}"
                                  onsubmit="return confirm('Eliminar fabricante?');">
                                <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
