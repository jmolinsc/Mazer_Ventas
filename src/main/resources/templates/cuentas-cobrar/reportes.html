<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Reportes de Cuentas por Cobrar',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Cartera Vencida</h5>
                    <p class="card-text display-6">$8,500.00</p>
                    <p class="text-danger small">8 facturas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Por Vencer</h5>
                    <p class="card-text display-6">$12,000.00</p>
                    <p class="text-warning small">5 facturas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Tasa Recaudación</h5>
                    <p class="card-text display-6">78%</p>
                    <p class="text-success small">Excelente</p>
                </div>
            </div>
        </div>
    </div>
    <div class="card mt-4">
        <div class="card-header">
            <h4 class="card-title">Gráfico de Cartera</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">Análisis de cartera vencida, por vencer y al día</p>
        </div>
    </div>
</section>
</body>
</html>
