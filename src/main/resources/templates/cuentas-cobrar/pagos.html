<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Registrar Pago - Cuentas por Cobrar',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Registrar Pago de Cliente</h4>
        </div>
        <div class="card-body">
            <form>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="cliente" class="form-label">Cliente</label>
                            <select class="form-select" id="cliente">
                                <option selected>Seleccionar cliente</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="factura" class="form-label">Factura</label>
                            <select class="form-select" id="factura">
                                <option selected>Seleccionar factura</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="monto" class="form-label">Monto a Pagar</label>
                            <input type="number" step="0.01" class="form-control" id="monto">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="fecha-pago" class="form-label">Fecha de Pago</label>
                            <input type="date" class="form-control" id="fecha-pago">
                        </div>
                    </div>
                </div>
                <div class="form-group mb-3">
                    <label for="metodo" class="form-label">Método de Pago</label>
                    <select class="form-select" id="metodo">
                        <option selected>Seleccionar método</option>
                        <option>Efectivo</option>
                        <option>Transferencia</option>
                        <option>Cheque</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Registrar Pago</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
