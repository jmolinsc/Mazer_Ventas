<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: layout(
    'Nuevo Cliente - Sistema de Ventas',
    ${pageHeading},
    ${pageSubtitle},
    ~{::section}
)}">
<section class="section">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Registrar Nuevo Cliente</h4>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <form method="post" th:action="@{/clientes/nuevo}" th:object="${clienteForm}">
                <ul class="nav nav-tabs mb-3" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" type="button" data-bs-toggle="tab" data-bs-target="#tab-generales">Datos generales</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" type="button" data-bs-toggle="tab" data-bs-target="#tab-planeacion">Planeacion</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" type="button" data-bs-toggle="tab" data-bs-target="#tab-otros">Otros datos</button>
                    </li>
                </ul>

                <div class="tab-content border border-top-0 rounded-bottom p-3">
                    <div id="tab-generales" class="tab-pane fade show active">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="nombre" th:field="*{nombre}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="telefono" class="form-label">Telefono</label>
                                    <input type="tel" class="form-control" id="telefono" th:field="*{telefono}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="categoria" class="form-label">Categoria</label>
                                    <select class="form-select" id="categoria" th:field="*{categoria}">
                                        <option value="">Seleccionar categoria</option>
                                        <option th:each="categoria : ${categorias}" th:value="${categoria}" th:text="${categoria}"></option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></small>
                                </div>
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="direccion" class="form-label">Direccion</label>
                            <textarea class="form-control" id="direccion" rows="2" th:field="*{direccion}"></textarea>
                            <small class="text-danger" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></small>
                        </div>
                    </div>

                    <div id="tab-planeacion" class="tab-pane fade">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="limiteCredito" class="form-label">Limite credito</label>
                                    <input type="number" step="0.01" class="form-control" id="limiteCredito" th:field="*{limiteCredito}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('limiteCredito')}" th:errors="*{limiteCredito}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="diasCredito" class="form-label">Dias credito</label>
                                    <input type="number" class="form-control" id="diasCredito" th:field="*{diasCredito}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('diasCredito')}" th:errors="*{diasCredito}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="agente" class="form-label">Agente</label>
                                    <input type="text" class="form-control" id="agente" th:field="*{agente}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('agente')}" th:errors="*{agente}"></small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="tab-otros" class="tab-pane fade">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="nit" class="form-label">NIT</label>
                                    <input type="text" class="form-control" id="nit" th:field="*{nit}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('nit')}" th:errors="*{nit}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="nrc" class="form-label">NRC</label>
                                    <input type="text" class="form-control" id="nrc" th:field="*{nrc}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('nrc')}" th:errors="*{nrc}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="actividadEconomica" class="form-label">Actividad economica</label>
                                    <select class="form-select select2-field" id="actividadEconomica" th:field="*{actividadEconomica}" th:attr="data-current=*{actividadEconomica}">
                                        <option value="">Seleccionar actividad economica</option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('actividadEconomica')}" th:errors="*{actividadEconomica}"></small>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="pais" class="form-label">Pais</label>
                                    <select class="form-select select2-field" id="pais" th:field="*{pais}">
                                        <option value="">Seleccionar pais</option>
                                        <option th:each="pais : ${paises}" th:value="${pais}" th:text="${pais}"></option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('pais')}" th:errors="*{pais}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="departamento" class="form-label">Departamento</label>
                                    <select class="form-select select2-field" id="departamento" th:field="*{departamento}" th:attr="data-current=*{departamento}">
                                        <option value="">Seleccionar departamento</option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('departamento')}" th:errors="*{departamento}"></small>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group mb-3">
                                    <label for="municipio" class="form-label">Municipio</label>
                                    <select class="form-select select2-field" id="municipio" th:field="*{municipio}" th:attr="data-current=*{municipio}">
                                        <option value="">Seleccionar municipio</option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('municipio')}" th:errors="*{municipio}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                    <a th:href="@{/clientes/listar}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script th:src="@{/js/cliente-form.js}"></script>
</section>
</body>
</html>
